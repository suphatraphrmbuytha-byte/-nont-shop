```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>

<style>

body{
    background:#0b1120;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:320px;
    animation:floatBox 3s ease-in-out infinite;
}

@keyframes floatBox{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-15px);
    }

    100%{
        transform:translateY(0px);
    }

}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

a{
    color:#38bdf8;
    text-decoration:none;
}

.promo-popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.promo-box{
    background:#111827;
    padding:30px;
    width:320px;
    border-radius:20px;
    text-align:center;
    position:relative;
}

.promo-box h1{
    color:gold;
}

.close-popup{
    position:absolute;
    top:15px;
    right:15px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>🔐 เข้าสู่ระบบ</h2>

<input type="text" id="username" placeholder="ชื่อผู้ใช้">

<input type="password" id="password" placeholder="รหัสผ่าน">

<button onclick="login()">
เข้าสู่ระบบ
</button>

<br><br>

<a href="register.html">
สมัครสมาชิก
</a>

</div>

<!-- Popup โปรโมชั่น -->
<div id="promoPopup" class="promo-popup">

    <div class="promo-box">

        <span class="close-popup" onclick="closePopup()">
            ✖
        </span>

        <h2>🎉 โปรโมชั่นพิเศษ</h2>

        <p>ลูกค้า 10 คนแรกเท่านั้น</p>

        <h1>รับส่วนลด 10%</h1>

        <p>รีบสมัครก่อนสิทธิ์หมด</p>

    </div>

</div>

<script>

function closePopup(){

    document.getElementById("promoPopup").style.display = "none";

}

function login(){

    let user = localStorage.getItem("username");
    let pass = localStorage.getItem("password");

    if(
        document.getElementById("username").value == user &&
        document.getElementById("password").value == pass
    ){

        localStorage.setItem("loggedIn","true");

        window.location.href = "home.html";

    }else{

        alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");

    }

}

</script>

</body>
</html>
```
