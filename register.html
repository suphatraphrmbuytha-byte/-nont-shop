
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก - VPN SHOP</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    color:white;
}

.box{
    background:#111827;
    padding:30px;
    width:320px;
    border-radius:20px;
    animation:floatBox 3s ease-in-out infinite;
}

.logo{
    width:180px;
    display:block;
    margin:0 auto 20px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    cursor:pointer;
}

.loader{
    display:inline-block;
    width:20px;
    height:20px;
    border:3px solid rgba(255,255,255,.3);
    border-top:3px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{
        transform:rotate(0deg);
    }

    100%{
        transform:rotate(360deg);
    }
}

@keyframes bgMove{
    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

@keyframes floatBox{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-15px);
    }

    100%{
        transform:translateY(0px);
    }
}

</style>
</head>

<body>

<div class="box">

<img src="logo..png" class="logo">
<h2>📝 สมัครสมาชิก</h2>

<input type="text" id="username" placeholder="ชื่อผู้ใช้">

<input type="password" id="password" placeholder="รหัสผ่าน">

<button id="registerBtn" onclick="register()">
สมัครสมาชิก
</button>

</div>

<script>

function register(){

document.getElementById("registerBtn").innerHTML =
'<span class="loader"></span>';

document.getElementById("registerBtn").disabled = true;

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

fetch(
"https://script.google.com/macros/s/AKfycbzwjgBRgtqQx9xPno366O-lDS_b13yyKmkDoxL3qhzYdVYFV9dWVkC5UoukjRS7tR1ozA/exec?action=register&username="
+ encodeURIComponent(username)
+ "&password="
+ encodeURIComponent(password)
)

.then(response => response.text())

.then(result => {

if(result == "success"){

localStorage.setItem("username", username);
localStorage.setItem("password", password);

alert("สมัครสมาชิกสำเร็จ");

window.location.href = "index.html";

}else if(result == "exist"){

alert("ชื่อผู้ใช้นี้ถูกใช้แล้ว");

document.getElementById("registerBtn").innerHTML = "สมัครสมาชิก";
document.getElementById("registerBtn").disabled = false;

}

});

}

</script>

</body>
</html>
