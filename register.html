
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก</title>

<style>

body{
    background:#0b1120;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#111827;
    padding:30px;
    border-radius:20px;
    width:320px;
}

input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="box">

<h2>📝 สมัครสมาชิก</h2>

<input type="text" id="username" placeholder="ชื่อผู้ใช้">

<input type="password" id="password" placeholder="รหัสผ่าน">

<button onclick="register()">
สมัครสมาชิก
</button>

</div>

<script>

function register(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

fetch(
"https://script.google.com/macros/s/AKfycbzwjgBRgtqQx9xPno366O-lDS_b13yyKmkDoxL3qhzYdVYFV9dWVkC5UoukjRS7tR1ozA/exec?action=register&username="
+ encodeURIComponent(username)
+ "&password="
+ encodeURIComponent(password)
)

.then(response => response.text())

.then(result => {

if(result == "success"){

localStorage.setItem("username", username);
localStorage.setItem("password", password);

alert("สมัครสมาชิกสำเร็จ");

window.location.href = "index.html";

}else if(result == "exist"){

alert("ชื่อผู้ใช้นี้ถูกใช้แล้ว");

}

});

}
</script>

</body>
</html>
