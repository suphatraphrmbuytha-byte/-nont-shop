<script>

function register(){

document.getElementById("registerBtn").innerHTML =
'<span class="loader"></span>';

document.getElementById("registerBtn").disabled = true;

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

fetch(
"https://script.google.com/macros/s/AKfycbzwjgBRgtqQx9xPno366O-lDS_b13yyKmkDoxL3qhzYdVYFV9dWVkC5UoukjRS7tR1ozA/exec?action=register&username="
+ encodeURIComponent(username)
+ "&password="
+ encodeURIComponent(password)
)

.then(response => response.text())

.then(result => {

if(result == "success"){

localStorage.setItem("username", username);
localStorage.setItem("password", password);

alert("สมัครสมาชิกสำเร็จ");

window.location.href = "index.html";

}else if(result == "exist"){

alert("ชื่อผู้ใช้นี้ถูกใช้แล้ว");

}

});

}
